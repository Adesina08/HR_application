    />

    <main class="container py-4">
      <div id="alerts"></div>
      <h2 class="mb-4">Apply for Leave</h2>
      <form id="leaveForm">
        <div class="row g-3">
          <div class="col-md-6">
            <label for="employee_id" class="form-label">Employee<span class="text-danger">*</span></label>
            <select class="form-select" id="employee_id" required>
              <!-- Options loaded via JS -->
            </select>
          </div>
          <div class="col-md-3">
            <label for="start_date" class="form-label">Start Date<span class="text-danger">*</span></label>
            <input type="date" class="form-control" id="start_date" required />
          </div>
          <div class="col-md-3">
            <label for="end_date" class="form-label">End Date<span class="text-danger">*</span></label>
            <input type="date" class="form-control" id="end_date" required />
          </div>
          <div class="col-md-4">
            <label for="leave_type" class="form-label">Leave Type<span class="text-danger">*</span></label>
            <select class="form-select" id="leave_type" required>
              <option value="" disabled selected>Select type</option>
              <option value="Annual Leave">Annual Leave</option>
              <option value="Sick Leave">Sick Leave</option>
              <option value="Maternity Leave">Maternity Leave</option>
              <option value="Paternity Leave">Paternity Leave</option>
              <option value="Study Leave">Study Leave</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="col-12">
            <label for="reason" class="form-label">Reason / Notes</label>
            <textarea class="form-control" id="reason" rows="3"></textarea>
          </div>
        </div>
        <div class="mt-4">
          <button type="submit" class="btn btn-success">Submit</button>
          <a href="leaves.html" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/app.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', initLeaveForm);
    </script>
  </body>
