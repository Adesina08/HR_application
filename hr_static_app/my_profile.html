<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile | HR Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-sJQPuL85CMwA3uWu94wL1PCx4fDg12jCwZ49Y1YWUod0VyGOnrph6tj7I0icx+obF4H6kZUPUYpx0fb7uE1Llw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="static/css/styles.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="staff_dashboard.html">HR Portal</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#profileNavbar"
          aria-controls="profileNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="profileNavbar">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="staff_dashboard.html">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="goals.html">My Goals</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="leaves.html">My Leaves</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="my_profile.html">My Profile</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="announcements.html">Announcements</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" onclick="logout()">Logout</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="container py-4">
      <div id="alerts"></div>
      <h2 class="mb-3">My Profile</h2>
      <form id="profileForm">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">First Name</label>
            <input type="text" id="profile_first_name" class="form-control" readonly />
          </div>
          <div class="col-md-6">
            <label class="form-label">Last Name</label>
            <input type="text" id="profile_last_name" class="form-control" readonly />
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" id="profile_email" class="form-control" readonly />
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input type="text" id="profile_phone" class="form-control" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Department</label>
            <input type="text" id="profile_department" class="form-control" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Position</label>
            <input type="text" id="profile_position" class="form-control" />
          </div>
          <div class="col-12">
            <label class="form-label">Address</label>
            <textarea id="profile_address" class="form-control" rows="2"></textarea>
          </div>
        </div>
        <button type="submit" class="btn btn-success mt-3">Save Changes</button>
      </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/app.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', initMyProfile);
    </script>
  </body>
</html>
