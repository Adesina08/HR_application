<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | HR Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-sJQPuL85CMwA3uWu94wL1PCx4fDg12jCwZ49Y1YWUod0VyGOnrph6tj7I0icx+obF4H6kZUPUYpx0fb7uE1Llw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="static/css/styles.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="#">HR Portal</a>
      </div>
    </nav>
    <main class="container py-5">
      <div id="alerts"></div>
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card shadow-sm">
            <div class="card-body">
              <h3 class="card-title mb-3 text-center">Login</h3>
              <p id="noEmployeesMessage" class="text-danger d-none">No employees found. Please add employees first.</p>
              <form id="loginForm">
                <div class="mb-3">
                  <label class="form-label">Select your name</label>
                  <select id="loginEmployeeSelect" class="form-select" required></select>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/app.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', initLogin);
    </script>
  </body>
</html>
